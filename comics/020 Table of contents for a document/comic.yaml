panels:
  - text: >
      Give your site's long pages a **table of contents** so readers can quickly navigate to a particular section.
    actor: Bob
    scene: editor.ori.html
    name: headings.md
    content: !ori headings.md

  - text: >
      The **markdown outline** function analyzes a markdown document and returns an object with the document's structure.
    scene: session.ori.html
    content: |
      $ ori Origami.mdOutline headings.md
      ${ Origami.yaml(Origami.mdOutline(headings.md)) }
      $

  - text: >
      Use a template to **turn that structure into links!**
    scene: editor.ori.html
    name: headings.ori
    content: !ori headings.ori

  - text: >
      This lets you add links on the page **to all the headings!**
    actor: Bob
    scene: browser.ori.html
    url: http://localhost:5000/rules.html
    content: !ori pageStyled.ori.html()
    footnote:
      text: The same function can also break up a long document into **multiple pages**.

date: 2026-05-18
post: |
  #documentation

link:
  href: https://weborigami.org/builtins/origami/mdoutline
  text: Origami.mdOutline builtin function
