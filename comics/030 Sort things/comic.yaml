panels:
  - text: >
      When an Origami template shows data from a folder, by default it's **sorted by file name**.
    actor: Bob
    face: thinkRight
    scene: split.ori.html
    panes:
      - scene: editor.ori.html
        name: haiku.ori
        content: !ori haiku1.ori.html
      - scene: browser.ori.html
        url: http://localhost:5000/haiku.html
        content: !ori haiku1.ori.html()

  - text: >
      To sort by a data field, use Origami's **sort** function.
    scene: split.ori.html
    panes:
      - scene: editor.ori.html
        name: haiku.ori
        content: !ori haiku2.ori.html
      - scene: browser.ori.html
        url: http://localhost:5000/haiku.html
        content: !ori haiku2.ori.html()
    footnote:
      text: Now sorted by author!

  - text: >
      For an **arbitrary order**, create an object with the file names in the order you want them.
    scene: editor.ori.html
    name: ordered.ori
    content: !ori ordered/poems/ordered.ori
    footnote:
      text: This can go in the folder with the files.

  - text: >
      Use that object as your data source, and the template will **use your order** to list things.
    actor: Bob
    scene: split.ori.html
    panes:
      - scene: editor.ori.html
        name: haiku.ori
        content: !ori ordered/haiku3.ori.html
      - scene: browser.ori.html
        url: http://localhost:5000/haiku.html
        content: !ori ordered/haiku3.ori.html()

date: 2026-08-11
